version: 2

# `goreleaser release --clean` is meant to be self-contained — calling it
# without this hook used to embed a stale (or empty) web/dist into the
# release tarball when run locally. The release.yml workflow already runs
# the frontend build separately, so this is mostly insurance for human
# operators running goreleaser by hand.
before:
  hooks:
    - bash -c "cd web && npm ci && npm run build"

builds:
  - id: sfpanel
    main: ./cmd/sfpanel
    binary: sfpanel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: sfpanel
    formats:
      - tar.gz
    name_template: "sfpanel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - configs/config.example.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: svrforum
    name: SFPanel
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
