name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Install Tauri CLI
        run: cd desktop && npm ci

      - name: Build Tauri app
        run: cd desktop && npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Collect artifacts (Linux)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "desktop\src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi" dist\ -ErrorAction SilentlyContinue
          Copy-Item "desktop\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe" dist\ -ErrorAction SilentlyContinue
          $exe = "desktop\src-tauri\target\${{ matrix.target }}\release\SFPanel.exe"
          if (Test-Path $exe) {
            Compress-Archive -Path $exe -DestinationPath "dist\SFPanel_portable_windows_amd64.zip"
          }

      - name: Collect artifacts (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
