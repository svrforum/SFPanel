name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Install Tauri CLI
        run: cd desktop && npm ci

      - name: Build Tauri app
        run: cd desktop && npx tauri build --target ${{ matrix.target }}
        env:
          # Updater key pair: pubkey embedded in desktop/src-tauri/tauri.conf.json,
          # private key + password come from repo secrets so signed update artifacts
          # can be verified by clients in the field.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts (Linux)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          # Updater artefacts — used by tauri-plugin-updater on the client
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig dist/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "desktop\src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi" dist\ -ErrorAction SilentlyContinue
          Copy-Item "desktop\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe" dist\ -ErrorAction SilentlyContinue
          # Updater artefacts (NSIS sig only — MSI updater path is the same .exe.sig)
          Copy-Item "desktop\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe.sig" dist\ -ErrorAction SilentlyContinue
          $exe = "desktop\src-tauri\target\${{ matrix.target }}\release\sfpanel-desktop.exe"
          if (Test-Path $exe) {
            Copy-Item $exe "dist\SFPanel_portable_windows_amd64.exe"
          }

      - name: Collect artifacts (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          # Updater artefacts — Tauri ships .app.tar.gz for the macOS updater channel
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig dist/ 2>/dev/null || true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    name: Updater manifest (latest.json)
    runs-on: ubuntu-latest
    needs: build-desktop
    steps:
      - name: Checkout (for jq, no source needed)
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # GITHUB_REF on tag push: refs/tags/v0.13.5
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download signature files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.sig" \
            --dir sigs
          ls -la sigs/

      - name: Compose latest.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read each signature file content (Tauri expects the full minisign body).
          read_sig() {
            local pattern="$1"
            local file
            file=$(find sigs -maxdepth 1 -name "$pattern" -print -quit)
            if [ -n "$file" ]; then
              cat "$file" | tr -d '\r'
            else
              echo ""
            fi
          }

          LINUX_SIG=$(read_sig "*amd64.AppImage.tar.gz.sig")
          WINDOWS_SIG=$(read_sig "*x64-setup.exe.sig")
          MACOS_SIG=$(read_sig "*aarch64.app.tar.gz.sig")

          # If any signature is missing, fail loudly — half-signed manifest is worse
          # than no manifest at all (Tauri would skip platforms silently).
          for label in "Linux=$LINUX_SIG" "Windows=$WINDOWS_SIG" "macOS=$MACOS_SIG"; do
            name="${label%%=*}"; value="${label#*=}"
            if [ -z "$value" ]; then
              echo "::error::Missing $name signature — refusing to publish a partial latest.json"
              exit 1
            fi
          done

          # Build manifest. URLs follow the existing artifact naming.
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "$BASE/SFPanel_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$WINDOWS_SIG",
                "url": "$BASE/SFPanel_${VERSION}_x64-setup.exe"
              },
              "darwin-aarch64": {
                "signature": "$MACOS_SIG",
                "url": "$BASE/SFPanel_${VERSION}_aarch64.app.tar.gz"
              }
            }
          }
          EOF
          echo "--- latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
