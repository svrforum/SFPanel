name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt the Node.js-based actions onto Node 24 before GitHub flips the default
# in 2026-06. No untrusted input is injected anywhere in this workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI never drifts behind a dep
          # bump that raises the minimum Go toolchain.
          go-version-file: go.mod
          cache: true
      - run: go test ./internal/... -v -count=1

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI never drifts behind a dep
          # bump that raises the minimum Go toolchain.
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          # Pinned to 20 to match release.yml + release-desktop.yml so all
          # frontend builds in CI produce byte-identical output.
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI never drifts behind a dep
          # bump that raises the minimum Go toolchain.
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - run: go build -o sfpanel ./cmd/sfpanel

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      # Frontend lint failures used to be silently swallowed via "|| true".
      # Removing the guard so a lint regression actually breaks CI.
      - run: cd web && npm run lint
      - run: cd web && npm run build
