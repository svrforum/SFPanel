syntax = "proto3";
package sfpanel.cluster;
option go_package = "github.com/svrforum/SFPanel/internal/cluster/proto";

service ClusterService {
    rpc PreFlight(PreFlightRequest) returns (PreFlightResponse);
    rpc Join(JoinRequest) returns (JoinResponse);
    rpc Leave(LeaveRequest) returns (LeaveResponse);
    rpc Heartbeat(stream HeartbeatPing) returns (stream HeartbeatPong);
    rpc ProxyRequest(APIRequest) returns (APIResponse);
    rpc GetMetrics(MetricsRequest) returns (MetricsResponse);
    rpc Subscribe(SubscribeRequest) returns (stream ClusterEvent);
}

message PreFlightRequest {
    string token = 1;
}

message PreFlightResponse {
    bool   valid = 1;
    string error = 2;
    string cluster_name = 3;
    int32  node_count = 4;
    int32  max_nodes = 5;
}

message JoinRequest {
    string token = 1;
    string node_id = 2;
    string node_name = 3;
    string api_address = 4;
    string grpc_address = 5;
    bytes  tls_cert = 6;
}

message JoinResponse {
    bool   success = 1;
    string error = 2;
    string cluster_name = 3;
    bytes  ca_cert = 4;
    bytes  node_cert = 5;
    bytes  node_key = 6;
    repeated NodeInfo peers = 7;
    string jwt_secret = 8;
    string admin_username = 9;
    string admin_password_hash = 10;
    bool   raft_tls = 11;
    // TOTP secret of the admin account on the leader, so the joining node's
    // local DB is in sync before the FSM replication catches up. Empty if
    // the admin account doesn't have 2FA enabled.
    string admin_totp_secret = 12;
}

message LeaveRequest {
    string node_id = 1;
}

message LeaveResponse {
    bool   success = 1;
    string error = 2;
}

message HeartbeatPing {
    string node_id = 1;
    double cpu_percent = 2;
    double memory_percent = 3;
    int32  container_count = 4;
    int64  timestamp = 5;
    double disk_percent = 6;
    string version = 7;
}

message HeartbeatPong {
    string leader_id = 1;
    int64  timestamp = 2;
}

message APIRequest {
    string method = 1;
    string path = 2;
    bytes  body = 3;
    map<string, string> headers = 4;
    string auth_token = 5;
}

message APIResponse {
    int32  status_code = 1;
    bytes  body = 2;
    map<string, string> headers = 3;
}

message MetricsRequest {
    string node_id = 1;
}

message MetricsResponse {
    string node_id = 1;
    double cpu_percent = 2;
    double memory_percent = 3;
    double disk_percent = 4;
    int32  container_count = 5;
    int64  uptime_seconds = 6;
}

message SubscribeRequest {
    string node_id = 1;
    repeated string event_types = 2;
}

message ClusterEvent {
    string event_type = 1;
    string node_id = 2;
    string detail = 3;
    int64  timestamp = 4;
}

message NodeInfo {
    string id = 1;
    string name = 2;
    string api_address = 3;
    string grpc_address = 4;
    string role = 5;
    string status = 6;
}
